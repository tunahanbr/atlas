name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: atlas
          POSTGRES_PASSWORD: atlas
          POSTGRES_DB: atlas_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U atlas -d atlas_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://atlas:atlas@localhost:5432/atlas_test
      AUTH_SECRET: ci-only-secret-that-is-not-used-outside-this-job
      AUTH_URL: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.11.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm db:deploy
      - run: pnpm db:seed
      - name: Verify repeatable seed
        run: pnpm db:seed
      - run: pnpm prisma validate
      - run: pnpm lint --max-warnings=0
      - run: pnpm test
      - run: pnpm test:integration
      - run: pnpm build
      - name: Build production container
        run: docker build --tag atlas-ci:${{ github.sha }} .
