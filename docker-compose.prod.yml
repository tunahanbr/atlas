# Full self-hosted stack: Atlas app + PostgreSQL.
#
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Then open http://localhost:3000 — migrations run automatically on start.
# Set AUTH_SECRET and AUTH_GITHUB_ID/SECRET before first deploy.

services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: atlas
      POSTGRES_PASSWORD: ${DB_PASSWORD:-atlas}
      POSTGRES_DB: atlas
    volumes:
      - atlas-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atlas -d atlas"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://atlas:${DB_PASSWORD:-atlas}@db:5432/atlas
      AUTH_SECRET: ${AUTH_SECRET:?Set AUTH_SECRET in your environment or .env}
      AUTH_URL: ${AUTH_URL:-http://localhost:3000}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      AUTH_GITHUB_ID: ${AUTH_GITHUB_ID:?Set AUTH_GITHUB_ID in your environment or .env}
      AUTH_GITHUB_SECRET: ${AUTH_GITHUB_SECRET:?Set AUTH_GITHUB_SECRET in your environment or .env}
      AUTH_TRUST_HOST: "true"
    ports:
      - "3000:3000"

volumes:
  atlas-db-data:
